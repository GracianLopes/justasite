<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Anniversary · Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=7">
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js"></script>
    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAxWnrRKNUlKLLVTnL_-Bm8F6vLq8_wP9c",
            authDomain: "anniversary-gallery-6d928.firebaseapp.com",
            projectId: "anniversary-gallery-6d928",
            storageBucket: "anniversary-gallery-6d928.appspot.com",
            messagingSenderId: "873490000003",
            databaseURL: "https://anniversary-gallery-6d928-default-rtdb.firebaseio.com",
            appId: "1:873490000003:web:8e1e2f45f0d3a2b1c5d7e9f"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
    </script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 id="anniversaryHeading">2 year Anniversary ❤️</h1>
            <p id="romanticLine" class="subheading">our beautiful memories ✨</p>

            <!-- Photo Gallery -->
            <div id="gallery" class="gallery"></div>

            <!-- Add Memory Button -->
            <button id="addMemoryBtn" class="add-btn">+ Add memory</button>

            <!-- Hidden file input for photos -->
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">

            <!-- Edit Buttons -->
            <div class="button-group">
                <button id="editSubtextBtn">📝 Edit subtext</button>
                <button id="generateLinkBtn" class="special-btn">🔗 Generate share link</button>
            </div>

            <!-- Popup for the generated link -->
            <div id="linkPopup" class="popup hidden">
                <p>Share this link with her:</p>
                <input type="text" id="shareLinkInput" readonly>
                <button id="copyLinkBtn">📋 Copy</button>
                <button id="closePopupBtn">Close</button>
            </div>
        </div>
    </div>

    <!-- Modal for enlarged image -->
    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="modalImage">
        <div id="modalCaption" class="modal-caption"></div>
    </div>

    <script src="script.js?v=7"></script>
</body>
</html>
